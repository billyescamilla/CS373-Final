<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Billy Escamilla, Programmer</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --accent: #00e5ff;
      --accent2: #ff6b35;
      --text: #f0f0f0;
      --muted: #555;
      --border: #222;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 60px 40px;
    }

    /* Header */
    .header {
      margin-bottom: 80px;
      animation: fadeUp 0.8s ease forwards;
      opacity: 0;
    }

    .tag {
      font-size: 11px;
      letter-spacing: 0.2em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .tag::before {
      content: '';
      display: inline-block;
      width: 24px;
      height: 1px;
      background: var(--accent);
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(72px, 12vw, 140px);
      line-height: 0.9;
      letter-spacing: 0.02em;
      color: var(--text);
    }

    h1 span {
      color: var(--accent);
      display: block;
    }

    .subtitle {
      margin-top: 24px;
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .subtitle::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
      max-width: 200px;
    }

    /* Cards */
    .cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px;
      margin-bottom: 2px;
      animation: fadeUp 0.8s ease 0.2s forwards;
      opacity: 0;
    }

    .card {
      background: var(--surface);
      padding: 32px;
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s;
    }

    .card:hover {
      border-color: var(--accent);
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px;
      height: 100%;
      background: var(--accent);
      transform: scaleY(0);
      transform-origin: top;
      transition: transform 0.3s;
    }

    .card:hover::before { transform: scaleY(1); }

    .card-label {
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .card-value {
      font-size: 18px;
      font-weight: 500;
      color: var(--text);
      line-height: 1.4;
    }

    .card-accent { color: var(--accent); }

    /* Bottom row */
    .bottom-row {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 2px;
      animation: fadeUp 0.8s ease 0.4s forwards;
      opacity: 0;
    }

    .card-wide {
      background: var(--surface);
      padding: 32px;
      border: 1px solid var(--border);
      transition: border-color 0.3s;
    }

    .card-wide:hover { border-color: var(--accent2); }

    .skills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }

    .skill-tag {
      font-size: 11px;
      padding: 5px 12px;
      border: 1px solid var(--border);
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: all 0.2s;
    }

    .skill-tag:hover {
      border-color: var(--accent2);
      color: var(--accent2);
    }

    .card-highlight {
      background: var(--accent);
      padding: 32px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .card-highlight .card-label { color: rgba(0,0,0,0.5); }
    .card-highlight .card-value { color: #000; font-size: 15px; }

    /* Footer */
    footer {
      margin-top: 60px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      animation: fadeUp 0.8s ease 0.6s forwards;
      opacity: 0;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      .cards, .bottom-row { grid-template-columns: 1fr; }
      .container { padding: 40px 24px; }
    }
  </style>
</head>
<body>
  <div class="container">

    <header class="header">
      <div class="tag">Portfolio</div>
      <h1>Billy<span>Escamilla</span></h1>
      <p class="subtitle">University of Wisconsin — Green Bay</p>
    </header>

    <div class="cards">
      <div class="card">
        <div class="card-label">Major</div>
        <div class="card-value card-accent">Computer Science</div>
      </div>
      <div class="card">
        <div class="card-label">Institution</div>
        <div class="card-value">UWGB</div>
      </div>
    </div>

    <div class="bottom-row">
      <div class="card-wide">
        <div class="card-label">Technologies</div>
        <div class="skills">
          <span class="skill-tag">AWS</span>
          <span class="skill-tag">Docker</span>
          <span class="skill-tag">Kubernetes</span>
          <span class="skill-tag">Jenkins</span>
          <span class="skill-tag">Linux</span>
          <span class="skill-tag">C</span>
          <span class="skill-tag">C++</span>
          <span class="skill-tag">Python</span>
          <span class="skill-tag">SQL</span>
          <span class="skill-tag">Git</span>
        </div>
      </div>
      <div class="card-highlight">
        <div class="card-label">Status</div>
        <div class="card-value">Available for opportunities</div>
      </div>
    </div>

    <footer>
      <span>escab30@uwgb.edu</span>
      <span>Green Bay, WI</span>
    </footer>

  </div>
</body>
</html>
